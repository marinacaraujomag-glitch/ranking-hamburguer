<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Ranking de Hambúrguer</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ranking Burger">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232A2420'/%3E%3Ctext x='50' y='64' font-size='50' text-anchor='middle' fill='%23E3A72E'%3E🍔%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:,">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root{
    --bg:#2A2420;
    --panel:#332B24;
    --panel2:#241F1A;
    --border:#4A4038;
    --text:#F2E9D8;
    --muted:#B8A88C;
    --muted2:#8C7E68;
    --mustard:#E3A72E;
    --brick:#C1440E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans', sans-serif;
    min-height:100vh;
    padding-bottom:100px;
  }
  .mono{font-family:'DM Mono', monospace;}
  .display{font-family:'Anton', sans-serif;}

  header{
    padding:32px 20px 20px;
    border-bottom:1px solid var(--border);
  }
  .eyebrow{
    display:flex;align-items:center;gap:8px;
    font-family:'DM Mono', monospace;
    font-size:11px;letter-spacing:0.16em;
    color:var(--muted);
    margin-bottom:6px;
  }
  h1{
    font-family:'Anton', sans-serif;
    font-size:2.1rem;
    line-height:1;
    letter-spacing:0.01em;
    margin:0;
  }
  h1 span{color:var(--mustard);}

  .filters{padding:16px 20px 0;display:flex;flex-direction:column;gap:10px;}
  .field-row{
    display:flex;align-items:center;gap:8px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
  }
  .field-row input, .field-row select{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--text);font-size:14px;font-family:'DM Sans', sans-serif;
  }
  .field-row select{appearance:none;}
  .field-row svg{flex-shrink:0;}
  .clear-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:0;display:flex;}

  .list{padding:20px 20px 0;display:flex;flex-direction:column;gap:12px;}
  .empty{
    text-align:center;padding:56px 16px;color:var(--muted2);font-size:14px;
  }
  .empty svg{margin:0 auto 12px;opacity:0.5;display:block;}

  .card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
  }
  .card .del{
    position:absolute;top:12px;right:12px;
    background:none;border:none;cursor:pointer;
    color:var(--muted);opacity:0.6;padding:4px;
  }
  .card .del:hover{opacity:1;}
  .card h3{
    margin:0;font-size:1rem;font-weight:700;color:var(--text);
    padding-right:24px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .card .meta{
    display:flex;align-items:center;gap:6px;
    color:var(--muted);font-size:12px;margin-top:3px;
  }
  .card .meta .sep{opacity:0.5;}
  .card .burger-name{margin:10px 0 0;font-size:14px;color:#D8C9AE;}
  .card .obs{margin:6px 0 0;font-size:14px;font-style:italic;color:var(--muted2);}

  .stamps{display:flex;gap:12px;margin-top:14px;}
  .stamp{
    width:58px;height:58px;border-radius:50%;
    border:2.5px solid var(--brick);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--brick);transform:rotate(-7deg);flex-shrink:0;
  }
  .stamp .score{font-family:'DM Mono', monospace;font-weight:700;font-size:1.05rem;line-height:1;}
  .stamp .lbl{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;line-height:1;margin-top:3px;}

  .fab{
    position:fixed;bottom:24px;right:20px;
    background:var(--brick);color:var(--text);
    border:none;border-radius:999px;
    padding:14px 20px;font-weight:700;font-size:14px;
    display:flex;align-items:center;gap:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.35);
    cursor:pointer;
  }
  .fab:active{transform:scale(0.95);}

  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.5);
    display:none;align-items:flex-end;z-index:20;
  }
  .overlay.open{display:flex;}
  .sheet{
    width:100%;max-height:90vh;overflow-y:auto;
    background:var(--panel2);border-top:1px solid var(--border);
    border-radius:20px 20px 0 0;padding:20px;
  }
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .sheet-head h2{font-family:'Anton', sans-serif;font-size:1.3rem;margin:0;}
  .sheet-head button{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;}

  .form-group{display:flex;flex-direction:column;gap:12px;}
  label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);}
  input[type=text], input[type=date], textarea{
    width:100%;margin-top:4px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text);
    outline:none;font-family:'DM Sans', sans-serif;
  }
  textarea{resize:none;font-family:'DM Sans', sans-serif;}

  .stepper-row{display:flex;gap:12px;}
  .stepper-wrap{flex:1;min-width:140px;}
  .stepper{
    display:flex;align-items:center;gap:8px;
    background:var(--panel2);border:1px solid var(--border);
    border-radius:10px;padding:6px 8px;
  }
  .stepper button{
    width:28px;height:28px;border-radius:8px;border:none;
    background:#332B24;color:var(--text);font-size:18px;line-height:1;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .stepper button:active{transform:scale(0.95);}
  .stepper .val{
    flex:1;text-align:center;font-family:'DM Mono', monospace;font-weight:700;font-size:1.05rem;
  }

  .submit-btn{
    margin-top:4px;background:var(--mustard);color:#241F1A;
    border:none;border-radius:10px;padding:14px;font-weight:700;font-size:14px;
    cursor:pointer;
  }
  .submit-btn:active{transform:scale(0.98);}
</style>
</head>
<body>

<header>
  <div class="eyebrow">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E3A72E" stroke-width="2"><path d="M4 16h16M4 12a8 8 0 0116 0M4 20h16"/></svg>
    CADERNO PESSOAL
  </div>
  <h1>RANKING DE<br><span>HAMBÚRGUER</span></h1>
</header>

<div class="filters">
  <div class="field-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B8A88C" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Buscar por restaurante ou hambúrguer" />
    <button class="clear-btn" id="clearSearch" style="display:none;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B8A88C" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="field-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B8A88C" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <select id="cityFilter"><option value="Todas">Todas</option></select>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B8A88C" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
  </div>
</div>

<div class="list" id="list"></div>

<button class="fab" id="openFormBtn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F2E9D8" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  Novo pedido
</button>

<div class="overlay" id="overlay">
  <form class="sheet" id="form">
    <div class="sheet-head">
      <h2>NOVO PEDIDO</h2>
      <button type="button" id="closeFormBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B8A88C" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="form-group">
      <div>
        <label>Restaurante</label>
        <input type="text" id="f-restaurante" required placeholder="Ex: Bendito Burger" />
      </div>
      <div>
        <label>Cidade</label>
        <input type="text" id="f-cidade" list="cidades-sugeridas" placeholder="Ex: Belo Horizonte" />
        <datalist id="cidades-sugeridas">
          <option value="Belo Horizonte">
          <option value="Ipatinga">
          <option value="Coronel Fabriciano">
          <option value="Timóteo">
          <option value="São Paulo">
        </datalist>
      </div>
      <div>
        <label>Hambúrguer pedido</label>
        <input type="text" id="f-hamburguer" required placeholder="Ex: Cheddar Bacon Duplo" />
      </div>
      <div>
        <label>Data do pedido</label>
        <input type="date" id="f-data" />
      </div>
      <div class="stepper-row">
        <div class="stepper-wrap">
          <label>Nota hambúrguer</label>
          <div class="stepper">
            <button type="button" data-step="-0.5" data-target="hamburguer">–</button>
            <div class="val" id="val-hamburguer" style="color:#E3A72E;">3.0</div>
            <button type="button" data-step="0.5" data-target="hamburguer">+</button>
          </div>
        </div>
        <div class="stepper-wrap">
          <label>Nota batata</label>
          <div class="stepper">
            <button type="button" data-step="-0.5" data-target="batata">–</button>
            <div class="val" id="val-batata" style="color:#C1440E;">3.0</div>
            <button type="button" data-step="0.5" data-target="batata">+</button>
          </div>
        </div>
      </div>
      <div>
        <label>Observação</label>
        <textarea id="f-observacao" rows="3" placeholder="Ex: pão amanteigado, ponto do blend perfeito, veio frio na segunda vez"></textarea>
      </div>
      <button type="submit" class="submit-btn">Salvar no ranking</button>
    </div>
  </form>
</div>

<script>
  const STORAGE_KEY = 'burger-entries-v1';
  let entries = [];
  let notaHamburguer = 3;
  let notaBatata = 3;

  function loadEntries(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    }catch(e){ entries = []; }
  }
  function saveEntries(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }
  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }
  function formatDateBR(iso){
    if(!iso) return '';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  const listEl = document.getElementById('list');
  const searchInput = document.getElementById('searchInput');
  const clearSearchBtn = document.getElementById('clearSearch');
  const cityFilterEl = document.getElementById('cityFilter');

  function renderCityOptions(){
    const cities = Array.from(new Set(entries.map(e => e.cidade))).sort();
    const current = cityFilterEl.value || 'Todas';
    cityFilterEl.innerHTML = '<option value="Todas">Todas</option>' +
      cities.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    cityFilterEl.value = cities.includes(current) ? current : 'Todas';
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function render(){
    const q = searchInput.value.trim().toLowerCase();
    const city = cityFilterEl.value;
    clearSearchBtn.style.display = searchInput.value ? 'flex' : 'none';

    let filtered = entries
      .filter(e => city === 'Todas' ? true : e.cidade === city)
      .filter(e => !q || e.restaurante.toLowerCase().includes(q) || e.hamburguer.toLowerCase().includes(q))
      .sort((a,b) => b.criadoEm - a.criadoEm);

    if(entries.length === 0){
      listEl.innerHTML = `<div class="empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8C7E68" stroke-width="2"><path d="M4 16h16M4 12a8 8 0 0116 0M4 20h16"/></svg>
        <p>Nenhum pedido registrado ainda.</p>
        <p>Toque em "Novo pedido" para começar seu ranking.</p>
      </div>`;
      return;
    }
    if(filtered.length === 0){
      listEl.innerHTML = `<div class="empty"><p>Nada encontrado com esse filtro.</p></div>`;
      return;
    }

    listEl.innerHTML = filtered.map(e => `
      <div class="card" data-id="${e.id}">
        <button class="del" aria-label="Excluir registro" data-id="${e.id}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B8A88C" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
        </button>
        <h3>${escapeHtml(e.restaurante)}</h3>
        <div class="meta">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#B8A88C" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>${escapeHtml(e.cidade)}</span>
          <span class="sep">·</span>
          <span class="mono">${formatDateBR(e.data)}</span>
        </div>
        <p class="burger-name">${escapeHtml(e.hamburguer)}</p>
        ${e.observacao ? `<p class="obs">"${escapeHtml(e.observacao)}"</p>` : ''}
        <div class="stamps">
          <div class="stamp"><span class="score">${e.notaHamburguer.toFixed(1)}</span><span class="lbl">burger</span></div>
          <div class="stamp"><span class="score">${e.notaBatata.toFixed(1)}</span><span class="lbl">batata</span></div>
        </div>
      </div>
    `).join('');

    listEl.querySelectorAll('.del').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        entries = entries.filter(e => e.id !== id);
        saveEntries();
        renderCityOptions();
        render();
      });
    });
  }

  searchInput.addEventListener('input', render);
  clearSearchBtn.addEventListener('click', () => { searchInput.value=''; render(); });
  cityFilterEl.addEventListener('change', render);

  // Form / sheet
  const overlay = document.getElementById('overlay');
  const openFormBtn = document.getElementById('openFormBtn');
  const closeFormBtn = document.getElementById('closeFormBtn');
  const form = document.getElementById('form');
  const fData = document.getElementById('f-data');

  function openForm(){
    fData.value = new Date().toISOString().slice(0,10);
    overlay.classList.add('open');
  }
  function closeForm(){
    overlay.classList.remove('open');
    form.reset();
    notaHamburguer = 3; notaBatata = 3;
    document.getElementById('val-hamburguer').textContent = '3.0';
    document.getElementById('val-batata').textContent = '3.0';
  }
  openFormBtn.addEventListener('click', openForm);
  closeFormBtn.addEventListener('click', closeForm);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) closeForm(); });

  document.querySelectorAll('.stepper button').forEach(btn => {
    btn.addEventListener('click', () => {
      const step = parseFloat(btn.getAttribute('data-step'));
      const target = btn.getAttribute('data-target');
      if(target === 'hamburguer'){
        notaHamburguer = Math.min(5, Math.max(0, notaHamburguer + step));
        document.getElementById('val-hamburguer').textContent = notaHamburguer.toFixed(1);
      } else {
        notaBatata = Math.min(5, Math.max(0, notaBatata + step));
        document.getElementById('val-batata').textContent = notaBatata.toFixed(1);
      }
    });
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const restaurante = document.getElementById('f-restaurante').value.trim();
    const hamburguer = document.getElementById('f-hamburguer').value.trim();
    if(!restaurante || !hamburguer) return;
    const novo = {
      id: uid(),
      restaurante,
      cidade: document.getElementById('f-cidade').value.trim() || 'Não informado',
      hamburguer,
      data: fData.value,
      notaHamburguer,
      notaBatata,
      observacao: document.getElementById('f-observacao').value.trim(),
      criadoEm: Date.now(),
    };
    entries.unshift(novo);
    saveEntries();
    renderCityOptions();
    render();
    closeForm();
  });

  // init
  loadEntries();
  renderCityOptions();
  render();
</script>
</body>
</html>
